version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: beublog-db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    container_name: beublog-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      # Notice we use the container name 'mongodb' instead of 'localhost' here!
      - MONGODB_URI=mongodb://mongodb:27017/blogdb
      - JWT_SECRET=guclu-bir-secret-key
    depends_on:
      - mongodb
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: beublog-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
  backend_uploads: